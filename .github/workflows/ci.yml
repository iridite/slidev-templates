name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build starter
        run: npm run build:neko

      - name: Install Playwright Chromium
        run: npx playwright-chromium install --with-deps chromium

      - name: Export starter PDF
        run: npm run export:neko
